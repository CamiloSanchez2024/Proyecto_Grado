services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-secure_api_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    command: uvicorn secure_api.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/secure_api
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-secure_api_db}
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"
      SECRET_KEY: ${SECRET_KEY:-cambia-esto-en-produccion-usa-un-secreto-largo-y-aleatorio}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      DEBUG: ${DEBUG:-true}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      RATE_LIMIT_ATTEMPTS: ${RATE_LIMIT_ATTEMPTS:-5}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-300}
      CLAVE_MAESTRA_AES: ${CLAVE_MAESTRA_AES:-CAMBIAR_EN_PRODUCCION_CON_32_BYTES_MINIMO_1234}
      RUTA_STORAGE: ${RUTA_STORAGE:-storage}
    volumes:
      - ./Backend/secure_api:/app/secure_api
      - backend_storage:/app/secure_api/storage
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  frontend:
    build:
      context: ./Frontend/crypto-group-web
      dockerfile: Dockerfile
      target: builder
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    working_dir: /app
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
    volumes:
      - ./Frontend/crypto-group-web:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"

volumes:
  postgres_data:
  backend_storage:
  frontend_node_modules:
